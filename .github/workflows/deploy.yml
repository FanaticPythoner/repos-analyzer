name: Deploy

on:
    push:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: write
    id-token: write
    pages: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build release artifacts
              run: bash scripts/release/build-release-artifacts.sh

            - name: Create latest prerelease
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE_TARGET_BRANCH: ${{ github.ref_name }}
                  RELEASE_TARGET_SHA: ${{ github.sha }}
              run: bash scripts/release/create-or-update-moving-github-release.sh

            - uses: actions/upload-pages-artifact@v5
              with:
                  path: .output/public

            - name: Deploy GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
